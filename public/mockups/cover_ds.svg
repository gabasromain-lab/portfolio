<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gb" cx="15%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#3e64a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gg" cx="80%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#23D63E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0c"/>
  <rect width="800" height="500" fill="url(#gb)"/>
  <rect width="800" height="500" fill="url(#gg)"/>

  <!-- ── LEFT: Title ── -->
  <text x="52" y="172" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="700" letter-spacing="-3" fill="rgba(255,255,255,0.93)">Copilote</text>
  <text x="52" y="248" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="300" letter-spacing="-3" fill="#23D63E">system.</text>
  <line x1="52" y1="276" x2="200" y2="276" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="52" y="302" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="400" letter-spacing="0.5" fill="rgba(255,255,255,0.28)">132 tokens · 26 type styles · v1.0</text>

  <!-- ── ISOMETRIC CARD 1: Colors (back, left) ── -->
  <!-- Card face: parallelogram tilted isometrically -->
  <g filter="url(#shadow)">
    <!-- Bottom/depth strip (left side of box) -->
    <polygon points="394,148 394,320 404,328 404,156" fill="rgba(0,0,0,0.4)"/>
    <!-- Bottom/depth strip (bottom of box) -->
    <polygon points="394,320 616,320 626,328 404,328" fill="rgba(0,0,0,0.25)"/>
    <!-- Card face -->
    <rect x="394" y="148" width="222" height="172" rx="12" fill="#111118" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
    <!-- Asphalt swatches -->
    <rect x="412" y="164" width="26" height="26" rx="6" fill="#EAEFFD"/>
    <rect x="444" y="164" width="26" height="26" rx="6" fill="#9391BF"/>
    <rect x="476" y="164" width="26" height="26" rx="6" fill="#585772"/>
    <rect x="508" y="164" width="26" height="26" rx="6" fill="#272733"/>
    <rect x="540" y="164" width="26" height="26" rx="6" fill="#1D1D26"/>
    <rect x="572" y="164" width="26" height="26" rx="6" fill="#14141A"/>
    <text x="412" y="206" font-family="Inter,system-ui,sans-serif" font-size="9" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">ASPHALT</text>
    <!-- Green swatches -->
    <rect x="412" y="214" width="26" height="26" rx="6" fill="#D2FDD8"/>
    <rect x="444" y="214" width="26" height="26" rx="6" fill="#56FF70"/>
    <rect x="476" y="214" width="26" height="26" rx="6" fill="#23D63E"/>
    <rect x="508" y="214" width="26" height="26" rx="6" fill="#1EBD36"/>
    <rect x="540" y="214" width="26" height="26" rx="6" fill="#168A27"/>
    <rect x="572" y="214" width="26" height="26" rx="6" fill="#06240A"/>
    <text x="412" y="256" font-family="Inter,system-ui,sans-serif" font-size="9" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">GREEN · BRAND</text>
    <!-- Red swatches -->
    <rect x="412" y="264" width="26" height="26" rx="6" fill="#FEE3E3"/>
    <rect x="444" y="264" width="26" height="26" rx="6" fill="#F58071"/>
    <rect x="476" y="264" width="26" height="26" rx="6" fill="#F5280F"/>
    <rect x="508" y="264" width="26" height="26" rx="6" fill="#DB250D"/>
    <rect x="540" y="264" width="26" height="26" rx="6" fill="#8F1809"/>
    <rect x="572" y="264" width="26" height="26" rx="6" fill="#751407"/>
    <text x="412" y="306" font-family="Inter,system-ui,sans-serif" font-size="9" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">RED · DANGER</text>
  </g>

  <!-- ── ISOMETRIC CARD 2: Buttons (front, right) ── -->
  <g filter="url(#shadow)">
    <!-- Depth left strip -->
    <polygon points="530,260 530,390 540,400 540,270" fill="rgba(0,0,0,0.4)"/>
    <!-- Depth bottom strip -->
    <polygon points="530,390 748,390 758,400 540,400" fill="rgba(0,0,0,0.25)"/>
    <!-- Card face -->
    <rect x="530" y="260" width="218" height="130" rx="12" fill="#111118" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
    <!-- Primary btn -->
    <rect x="548" y="278" width="84" height="28" rx="6" fill="rgba(255,255,255,0.9)"/>
    <text x="590" y="297" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#0a0a0c" text-anchor="middle">Primary</text>
    <!-- Brand btn -->
    <rect x="642" y="278" width="84" height="28" rx="6" fill="#23D63E"/>
    <text x="684" y="297" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#06240A" text-anchor="middle">Brand</text>
    <!-- Ghost btn -->
    <rect x="548" y="316" width="84" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="590" y="335" font-family="Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">Ghost</text>
    <!-- Danger btn -->
    <rect x="642" y="316" width="84" height="28" rx="6" fill="rgba(245,40,15,0.1)" stroke="rgba(245,40,15,0.2)" stroke-width="1"/>
    <text x="684" y="335" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#F58071" text-anchor="middle">Danger</text>
    <!-- Pill badges -->
    <rect x="548" y="356" width="48" height="18" rx="9" fill="rgba(35,214,62,0.1)" stroke="rgba(35,214,62,0.18)" stroke-width="1"/>
    <text x="572" y="369" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#23D63E" text-anchor="middle">Live</text>
    <rect x="604" y="356" width="56" height="18" rx="9" fill="rgba(18,109,249,0.1)" stroke="rgba(18,109,249,0.18)" stroke-width="1"/>
    <text x="632" y="369" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#5ba4f9" text-anchor="middle">In review</text>
    <rect x="668" y="356" width="58" height="18" rx="9" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="697" y="369" font-family="Inter,system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Neutral</text>
  </g>

  <!-- Bottom credits -->
  <text x="52" y="472" font-family="Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.16)">Coyote · 2024 · 3 Figma libraries</text>
</svg>
